services:
  - type: web
    name: weather-forecasting-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
